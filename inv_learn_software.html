<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="3D Shikshan" />
  <meta name="theme-color" content="#0b8a5e" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/app-icon.svg" />
  <link rel="stylesheet" href="assets/css/install-app.css" />
  <title>Guide & Inventory - 3D Shikshan</title>
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f5f6f8;
      --surface: #ffffff;
      --surface-2: #eef0f4;
      --border: #e0e3ea;
      --text: #1a1d26;
      --text-muted: #6b7185;
      --accent: #0b8a5e;
      --accent-light: #0b8a5e12;
      --red: #d9435f;
      --blue: #2e7bbf;
      --yellow: #c08b1d;
      --radius: 14px;
      --transition: .22s cubic-bezier(.4,0,.2,1);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html { -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      padding-bottom: calc(60px + var(--safe-bottom));
    }

    /* â”€â”€ PAGE VIEWS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .page {
      display: none;
      min-height: calc(100vh - 60px);
      max-width: 600px;
      margin: 0 auto;
      padding: 0 16px;
      animation: pageFadeIn .25s ease;
    }
    .page.active { display: block; }

    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .top-bar {
      position: sticky; top: 0; z-index: 9999;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      background: rgba(245,246,248,.88);
      padding: 14px 0 10px;
      padding-top: calc(14px + var(--safe-top));
      display: flex; align-items: center; gap: 8px;
    }
    .top-bar h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem; font-weight: 700;
    }
    .top-bar i.top-icon { font-size: 1rem; }
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; color: var(--accent);
      text-decoration: none; letter-spacing: -0.5px;
      font-size: 1.2rem;
    }
    .logo span { color: var(--text); }

    /* â”€â”€ BOTTOM TAB BAR â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; width: 100%; z-index: 9999;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      background: rgba(255,255,255,.94);
      border-top: 1px solid var(--border);
      padding-bottom: var(--safe-bottom);
    }
    .tab-bar-inner {
      max-width: 600px; margin: 0 auto;
      display: flex; height: 56px;
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      background: none; border: none; cursor: pointer;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: .64rem; font-weight: 600;
      transition: var(--transition);
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .tab-btn i { font-size: 1.15rem; transition: var(--transition); }
    .tab-btn.active { color: var(--accent); }
    .tab-btn.active::before {
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 28px; height: 3px; border-radius: 0 0 3px 3px;
      background: var(--accent);
    }
    .tab-btn:active { transform: scale(.92); }

    /* â”€â”€ SHARED â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .section-label {
      display: inline-block;
      font-size: .66rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.8px;
      color: var(--accent); background: var(--accent-light);
      padding: 5px 12px; border-radius: 20px;
      margin-bottom: 8px;
    }
    .section-subtitle {
      color: var(--text-muted); font-size: .88rem;
      margin-bottom: 20px;
    }

    /* â”€â”€ HERO â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .hero {
      padding: 16px 0 22px; text-align: center;
    }
    .hero h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem; font-weight: 700;
      line-height: 1.2; margin-bottom: 8px;
    }
    .hero h1 em {
      font-style: normal;
      background: linear-gradient(135deg, var(--accent), var(--blue));
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      color: var(--text-muted); font-size: .86rem;
      max-width: 360px; margin: 0 auto;
    }

    /* â”€â”€ HOME TOGGLE TABS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .home-tabs {
      display: flex; gap: 0;
      background: var(--surface-2);
      border-radius: 12px; padding: 3px;
      margin-bottom: 16px;
    }
    .home-tab-btn {
      flex: 1; padding: 9px 0;
      background: none; border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem; font-weight: 600;
      color: var(--text-muted); cursor: pointer;
      transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 6px;
      -webkit-tap-highlight-color: transparent;
    }
    .home-tab-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .home-tab-btn i { font-size: .8rem; }

    .home-panels { position: relative; }
    .home-panel { display: none; animation: pageFadeIn .2s ease; }
    .home-panel.active { display: block; }

    /* â”€â”€ SUB SECTIONS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .sub-section { margin-bottom: 28px; }
    .sub-heading {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .sub-heading i {
      font-size: .95rem; color: var(--accent);
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
    }
    .sub-heading h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem; font-weight: 700;
    }

    /* â”€â”€ CARDS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .card-grid { display: flex; flex-direction: column; gap: 10px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden; transition: var(--transition);
      text-decoration: none; color: inherit;
      display: flex; flex-direction: row;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active { transform: scale(.985); background: var(--surface-2); }
    .card-img { width: 92px; min-height: 92px; object-fit: cover; flex-shrink: 0; }
    .card-body {
      padding: 11px 12px; flex: 1;
      display: flex; flex-direction: column; justify-content: center;
    }
    .card-tag {
      font-size: .58rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.2px; margin-bottom: 2px;
    }
    .tag-news { color: var(--red); }
    .tag-blog { color: var(--blue); }
    .card-body h4 { font-size: .84rem; margin-bottom: 2px; line-height: 1.3; }
    .card-body p {
      color: var(--text-muted); font-size: .74rem; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-arrow {
      display: flex; align-items: center; justify-content: center;
      padding: 0 12px; color: var(--text-muted); font-size: .72rem;
      flex-shrink: 0;
    }

    /* â”€â”€ GUIDE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .guide-grid { display: flex; flex-direction: column; gap: 10px; }
    .guide-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px; transition: var(--transition);
      display: flex; gap: 14px; align-items: flex-start;
      cursor: pointer;
    }
    .guide-card:active { background: var(--surface-2); }
    .guide-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.05rem; flex-shrink: 0;
    }
    .guide-card-text h4 { font-size: .9rem; margin-bottom: 3px; }
    .guide-card-text p { color: var(--text-muted); font-size: .78rem; line-height: 1.45; }
    .gi-1 { background: #0b8a5e12; color: var(--accent); }
    .gi-2 { background: #2e7bbf14; color: var(--blue); }
    .gi-3 { background: #d9435f12; color: var(--red); }
    .gi-4 { background: #c08b1d14; color: var(--yellow); }

    .steps {
      margin-top: 24px;
      display: flex; flex-direction: column;
      gap: 10px; counter-reset: step;
    }
    .step {
      position: relative;
      padding: 14px 14px 14px 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      counter-increment: step;
      cursor: pointer;
    }
    .step::before {
      content: counter(step);
      position: absolute; top: 50%; left: 14px; transform: translateY(-50%);
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 700;
    }
    .step h5 { font-size: .86rem; margin-bottom: 2px; }
    .step p { color: var(--text-muted); font-size: .76rem; }

    /* â”€â”€ MAP â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    #mapContainer {
      width: 100%; height: 50vh; min-height: 300px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden; margin-bottom: 20px;
    }
    .district-filters {
      display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px;
      padding-bottom: 5px; scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .district-filters::-webkit-scrollbar { display: none; }
    .filter-pill {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 6px 14px; border-radius: 999px;
      font-size: .8rem; font-weight: 500; white-space: nowrap;
      cursor: pointer; transition: var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .filter-pill.active { background: var(--text); color: #fff; border-color: var(--text); }
    
    .college-cards-wrapper {
      position: relative; display: flex; align-items: center;
    }
    .scroll-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 50%; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: absolute; z-index: 10;
      box-shadow: var(--shadow-soft);
      transition: var(--transition);
    }
    .scroll-btn:hover { background: var(--bg); }
    .scroll-left { left: -10px; }
    .scroll-right { right: -10px; }
    .college-cards {
      display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px;
      scroll-snap-type: x mandatory; scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      width: 100%; padding-left: 10px; padding-right: 10px;
    }
    .college-cards::-webkit-scrollbar { display: none; }
    .college-map-card {
      min-width: 280px; max-width: 320px; scroll-snap-align: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      box-shadow: var(--shadow-soft);
      display: flex; flex-direction: column; gap: 10px;
      flex-shrink: 0;
    }
    .college-map-card h4 { font-size: .95rem; margin: 0; color: var(--accent); }
    .college-map-card p { font-size: .8rem; margin: 0; color: var(--text-muted); line-height: 1.4; }
    .college-card-actions { display: flex; gap: 8px; margin-top: 5px; }
    .college-card-actions a {
      flex: 1; padding: 8px; text-align: center; border-radius: 8px;
      font-size: .8rem; font-weight: 600; text-decoration: none;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      transition: var(--transition);
    }
    .btn-directions { background: #3b82f6; color: #fff; }
    .btn-call { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .btn-directions:active { background: #2563eb; }
    .btn-call:active { background: var(--surface-3); }

    /* â”€â”€ LOGIN â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .login-header {
      text-align: center; padding: 20px 0 24px;
    }
    .login-header i {
      font-size: 2.2rem; color: var(--accent);
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--accent-light);
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
    }
    .login-header h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.3rem; font-weight: 700; margin-bottom: 4px;
    }
    .login-header p { color: var(--text-muted); font-size: .86rem; }
    .error-banner {
      display: flex;
      align-items: center;
      gap: 9px;
      background: #fff1f1;
      border: 1px solid #fecaca;
      border-radius: var(--radius);
      color: #b91c1c;
      font-size: 13.5px;
      font-weight: 500;
      padding: 11px 14px;
      margin-bottom: 16px;
    }
    .error-banner svg {
      width: 17px;
      height: 17px;
      flex-shrink: 0;
    }
    .login-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: .78rem; font-weight: 600;
      margin-bottom: 5px; color: var(--text-muted);
    }
    .form-group input {
      width: 100%; padding: 11px 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem; outline: none;
      transition: var(--transition);
    }
    .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px #0b8a5e12; }
    .form-options {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; font-size: .8rem;
    }
    .form-options label {
      display: flex; align-items: center; gap: 6px;
      color: var(--text-muted); cursor: pointer;
    }
    .form-options a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .btn-login {
      width: 100%; padding: 12px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .92rem; font-weight: 700;
      cursor: pointer; transition: var(--transition);
      box-shadow: 0 4px 14px rgba(11,138,94,.2);
    }
    .btn-login:active { transform: scale(.97); }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 18px 0; color: var(--text-muted); font-size: .78rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .social-btns { display: flex; gap: 10px; }
    .social-btns button {
      flex: 1; padding: 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-size: 1.05rem; cursor: pointer;
      transition: var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .social-btns button:active { background: var(--surface-2); }
    .signup-link {
      text-align: center; margin-top: 18px;
      font-size: .82rem; color: var(--text-muted);
    }
    .signup-link a { color: var(--accent); text-decoration: none; font-weight: 600; }

    /* â”€â”€ PAGE FOOTER â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .page-footer {
      text-align: center; padding: 24px 0 12px;
      color: var(--text-muted); font-size: .7rem;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }

    /* â”€â”€ SCROLLBAR â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div class="page active" style="display: block; padding-bottom: 20px;">
  <div class="top-bar">
    <button onclick="window.location.href=''index.html#guide''" style="background:none;border:none;font-size:1.2rem;margin-right:12px;cursor:pointer;color:var(--text);"><i class="fa-solid fa-arrow-left"></i></button>
    <h2>Learn the Software</h2>
  </div>
  <div style="padding:16px; max-width: 600px; margin: 0 auto;">
    <p>Paste your Learn the Software content here...</p>
  </div>
</div>
</body>
</html>
